name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ruleaza testele JS (logica din js/calc.js)
        run: npm test

  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instaleaza dependinte
        run: pip install -r requirements.txt

      - name: Ruleaza testele Python (logica din fetch_prices.py)
        run: python -m unittest discover -s test -p "*_test.py" -v
