name: Fetch PZU prices

# De ce orele astea exact (in UTC, nu ora Romaniei):
# OPCOM publica preturile PZU pentru "maine" in jurul orei 13:00 iarna /
# 14:00 vara, ora Romaniei -- cele doua ore locale corespund de fapt
# ACELUIASI moment UTC fix (~11:00 UTC), pentru ca diferenta de o ora intre
# ele e exact diferenta dintre ora de iarna si ora de vara a Romaniei.
# Daca am fi scris cron-ul in "ora Romaniei" ar fi trebuit sa schimbam
# manual valoarea de doua ori pe an. Asa, un singur cron in UTC functioneaza
# tot anul fara nicio interventie.
on:
  schedule:
    - cron: "15 11 * * *"   # rulare principala, ~15 min dupa publicare
    - cron: "30 12 * * *"   # rulare de rezerva, in caz de publicare intarziata
  workflow_dispatch: {}      # permite rulare manuala din tab-ul Actions

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instaleaza dependinte
        run: pip install -r requirements.txt

      - name: Ruleaza pipeline-ul de date
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: python fetch_prices.py

      - name: Commit & push date noi (daca exista)
        run: |
          git config user.name "pzuro-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices.json data/history.json
          git diff --cached --quiet && echo "Fara schimbari, nimic de comis." && exit 0
          git commit -m "data: actualizare preturi PZU $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
